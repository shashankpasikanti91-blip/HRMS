# ============================================================
# SRP AI HRMS - Production Docker Compose
# Server: srp-ai-server (5.223.67.236)
# All containers prefixed with srp-hrms- to avoid conflicts
# ============================================================

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: srp-hrms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ssl/origin.pem:/etc/nginx/ssl/origin.pem:ro
      - ../ssl/origin.key:/etc/nginx/ssl/origin.key:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api-gateway:
        condition: service_healthy
      web:
        condition: service_started
      marketing:
        condition: service_started
    networks:
      - srp-hrms-prod

  # ---- PostgreSQL 16 + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: srp-hrms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - srp-hrms-prod

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: srp-hrms-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - srp-hrms-prod

  # ---- Elasticsearch 8 ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: srp-hrms-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.http.ssl.enabled=false
    ports:
      - "127.0.0.1:9201:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - srp-hrms-prod

  # ---- MinIO (S3-Compatible Storage) ----
  minio:
    image: minio/minio:latest
    container_name: srp-hrms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- NATS (Event Bus) ----
  nats:
    image: nats:2-alpine
    container_name: srp-hrms-nats
    restart: unless-stopped
    command: "--jetstream --store_dir /data --max_mem_store 256MB"
    ports:
      - "127.0.0.1:4223:4222"
      - "127.0.0.1:8223:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - srp-hrms-prod

  # ---- API Gateway ----
  api-gateway:
    build:
      context: ../../
      dockerfile: apps/api-gateway/Dockerfile
    image: srp-hrms/api-gateway:${IMAGE_TAG:-latest}
    container_name: srp-hrms-api-gateway
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - ELASTICSEARCH_HOST=elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Auth Service ----
  auth-service:
    build:
      context: ../../
      dockerfile: apps/auth-service/Dockerfile
    image: srp-hrms/auth-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-auth-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4001
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Core HR Service ----
  core-hr-service:
    build:
      context: ../../
      dockerfile: apps/core-hr-service/Dockerfile
    image: srp-hrms/core-hr-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-core-hr-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4002
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Attendance Service ----
  attendance-service:
    build:
      context: ../../
      dockerfile: apps/attendance-service/Dockerfile
    image: srp-hrms/attendance-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-attendance-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4003
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Payroll Service ----
  payroll-service:
    build:
      context: ../../
      dockerfile: apps/payroll-service/Dockerfile
    image: srp-hrms/payroll-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-payroll-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4004
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Recruitment Service ----
  recruitment-service:
    build:
      context: ../../
      dockerfile: apps/recruitment-service/Dockerfile
    image: srp-hrms/recruitment-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-recruitment-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4005
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Performance Service ----
  performance-service:
    build:
      context: ../../
      dockerfile: apps/performance-service/Dockerfile
    image: srp-hrms/performance-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-performance-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4006
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Notification Service ----
  notification-service:
    build:
      context: ../../
      dockerfile: apps/notification-service/Dockerfile
    image: srp-hrms/notification-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-notification-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4007
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Analytics Service ----
  analytics-service:
    build:
      context: ../../
      dockerfile: apps/analytics-service/Dockerfile
    image: srp-hrms/analytics-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-analytics-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4008
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - ELASTICSEARCH_HOST=elasticsearch
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- AI Engine (Python/FastAPI) ----
  ai-engine:
    build:
      context: ../../apps/ai-engine
      dockerfile: Dockerfile
    image: srp-hrms/ai-engine:${IMAGE_TAG:-latest}
    container_name: srp-hrms-ai-engine
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=8000
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=elasticsearch
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Web App (Next.js) ----
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    image: srp-hrms/web:${IMAGE_TAG:-latest}
    container_name: srp-hrms-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.hrms.srpailabs.com
      - NEXT_PUBLIC_APP_URL=https://app.hrms.srpailabs.com
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Marketing Site (Vite/React) ----
  marketing:
    build:
      context: ../../
      dockerfile: apps/marketing/Dockerfile
    image: srp-hrms/marketing:${IMAGE_TAG:-latest}
    container_name: srp-hrms-marketing
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - srp-hrms-prod

  # ---- n8n Workflow Automation ----
  n8n:
    image: n8nio/n8n:latest
    container_name: srp-hrms-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=n8n.hrms.srpailabs.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.hrms.srpailabs.com/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_DATABASE}
      - DB_POSTGRESDB_USER=${DB_USERNAME}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
    ports:
      - "127.0.0.1:5679:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: srp-hrms-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ../docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: srp-hrms-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.hrms.srpailabs.com
      - GF_SERVER_DOMAIN=grafana.hrms.srpailabs.com
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

volumes:
  postgres_data:
    name: srp-hrms-postgres-data
  redis_data:
    name: srp-hrms-redis-data
  elasticsearch_data:
    name: srp-hrms-elasticsearch-data
  minio_data:
    name: srp-hrms-minio-data
  nats_data:
    name: srp-hrms-nats-data
  n8n_data:
    name: srp-hrms-n8n-data
  prometheus_data:
    name: srp-hrms-prometheus-data
  grafana_data:
    name: srp-hrms-grafana-data
  nginx_logs:
    name: srp-hrms-nginx-logs

networks:
  srp-hrms-prod:
    driver: bridge
    name: srp-hrms-prod-network
