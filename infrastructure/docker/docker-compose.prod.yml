# ============================================================
# SRP AI HRMS - Production Docker Compose
# Server: srp-ai-server (5.223.67.236) — 4GB RAM, shared
# Host nginx handles SSL/routing — no nginx container needed
# Port 5433 taken by mediflow — using 5434 for HRMS DB
# ============================================================

services:
  # ---- PostgreSQL 16 + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: srp-hrms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - srp-hrms-prod

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: srp-hrms-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - srp-hrms-prod

  # ---- NATS (Event Bus) ----
  nats:
    image: nats:2-alpine
    container_name: srp-hrms-nats
    restart: unless-stopped
    command: "-js -sd /data"
    ports:
      - "127.0.0.1:4223:4222"
      - "127.0.0.1:8223:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - srp-hrms-prod

  # ---- API Gateway ----
  api-gateway:
    build:
      context: ../../
      dockerfile: apps/api-gateway/Dockerfile
    image: srp-hrms/api-gateway:${IMAGE_TAG:-latest}
    container_name: srp-hrms-api-gateway
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Auth Service ----
  auth-service:
    build:
      context: ../../
      dockerfile: apps/auth-service/Dockerfile
    image: srp-hrms/auth-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-auth-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4001
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    ports:
      - "127.0.0.1:4001:4001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Core HR Service ----
  core-hr-service:
    build:
      context: ../../
      dockerfile: apps/core-hr-service/Dockerfile
    image: srp-hrms/core-hr-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-core-hr-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4002
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Attendance Service ----
  attendance-service:
    build:
      context: ../../
      dockerfile: apps/attendance-service/Dockerfile
    image: srp-hrms/attendance-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-attendance-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4003
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    ports:
      - "127.0.0.1:4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Payroll Service ----
  payroll-service:
    build:
      context: ../../
      dockerfile: apps/payroll-service/Dockerfile
    image: srp-hrms/payroll-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-payroll-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4004
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    ports:
      - "127.0.0.1:4004:4004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Notification Service ----
  notification-service:
    build:
      context: ../../
      dockerfile: apps/notification-service/Dockerfile
    image: srp-hrms/notification-service:${IMAGE_TAG:-latest}
    container_name: srp-hrms-notification-service
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      - PORT=4007
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    ports:
      - "127.0.0.1:4007:4007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Web App (Next.js) ----
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    image: srp-hrms/web:${IMAGE_TAG:-latest}
    container_name: srp-hrms-web
    restart: unless-stopped
    command: ["dumb-init", "node", "apps/web/server.js"]
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.hrms.srpailabs.com
      - NEXT_PUBLIC_APP_URL=https://app.hrms.srpailabs.com
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - srp-hrms-prod

  # ---- Marketing Site (Vite/React) ----
  marketing:
    build:
      context: ../../
      dockerfile: apps/marketing/Dockerfile
    image: srp-hrms/marketing:${IMAGE_TAG:-latest}
    container_name: srp-hrms-marketing
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - srp-hrms-prod

volumes:
  postgres_data:
    name: srp-hrms-postgres-data
  redis_data:
    name: srp-hrms-redis-data
  nats_data:
    name: srp-hrms-nats-data

networks:
  srp-hrms-prod:
    driver: bridge
    name: srp-hrms-prod-network
