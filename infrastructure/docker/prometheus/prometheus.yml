global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: /metrics

  - job_name: 'auth-service'
    static_configs:
      - targets: ['host.docker.internal:4001']
    metrics_path: /metrics

  - job_name: 'core-hr-service'
    static_configs:
      - targets: ['host.docker.internal:4002']
    metrics_path: /metrics

  - job_name: 'attendance-service'
    static_configs:
      - targets: ['host.docker.internal:4003']
    metrics_path: /metrics

  - job_name: 'payroll-service'
    static_configs:
      - targets: ['host.docker.internal:4004']
    metrics_path: /metrics

  - job_name: 'recruitment-service'
    static_configs:
      - targets: ['host.docker.internal:4005']
    metrics_path: /metrics

  - job_name: 'ai-engine'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
